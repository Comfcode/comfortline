kind = "web"
previewPath = "/"
title = "ComfortLine Website"
version = "1.0.0"
id = "artifacts/comfortline-updated"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24307

[services.development]
run = "pnpm --dir artifacts/comfortline-updated run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--dir", "artifacts/comfortline-updated", "run", "build"]

[services.production.run]
args = ["node", "artifacts/comfortline-updated/server.mjs"]

[services.production.run.env]
PORT = "24307"
NODE_ENV = "production"

[services.production.health.startup]
path = "/"

[services.env]
PORT = "24307"
BASE_PATH = "/"
