<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>ComfortLine Website</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      /* Replain button overrides — applied via CSS so they persist */
      [id*="replain"][style*="position: fixed"],
      [id*="replain"][style*="position:fixed"],
      [class*="replain"][style*="position: fixed"],
      [class*="replain"][style*="position:fixed"] {
        background: #B59C73 !important;
        background-color: #B59C73 !important;
        border-radius: 22px !important;
        box-shadow: 0 4px 24px rgba(181,156,115,0.35) !important;
        overflow: hidden !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.replainSettings = { id: '64b5def6-9ee7-4b04-be31-287792b23e22' };
      (function(u){var s=document.createElement('script');s.async=true;s.src=u;
      var x=document.getElementsByTagName('script')[0];x.parentNode.insertBefore(s,x);
      })('https://widget.replain.cc/dist/client.js');
    </script>
    <script>
      (function() {
        var BRONZE = '#B59C73';
        var RADIUS = '22px';
        var SHADOW = '0 4px 24px rgba(181,156,115,0.35)';

        var watched = new WeakSet();

        function applyStyle(el) {
          el.style.setProperty('background',       BRONZE, 'important');
          el.style.setProperty('background-color', BRONZE, 'important');
          el.style.setProperty('border-radius',    RADIUS, 'important');
          el.style.setProperty('box-shadow',       SHADOW, 'important');
          el.style.setProperty('overflow',         'hidden', 'important');
        }

        function watchEl(el) {
          if (watched.has(el)) return;
          watched.add(el);
          applyStyle(el);
          /* Re-apply any time the widget touches its own style attribute */
          new MutationObserver(function() {
            applyStyle(el);
          }).observe(el, { attributes: true, attributeFilter: ['style'] });
        }

        function findAndWatch() {
          var all = document.querySelectorAll('[id*="replain"], [class*="replain"], [data-replain]');
          all.forEach(function(el) {
            var pos = window.getComputedStyle(el).position;
            if (pos === 'fixed') {
              watchEl(el);
            }
          });
        }

        /* Watch for widget being inserted */
        new MutationObserver(findAndWatch).observe(document.body, {
          childList: true, subtree: true
        });

        setTimeout(findAndWatch, 500);
        setTimeout(findAndWatch, 2000);
        setTimeout(findAndWatch, 5000);
      })();
    </script>
  </body>
</html>
