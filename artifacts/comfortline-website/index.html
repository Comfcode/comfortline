<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>ComfortLine — Premium Transfer</title>
    <meta name="description" content="Индивидуальный трансфер из Минска в аэропорты Европы. ComfortLine — премиум трансфер в Вильнюс, Варшаву и по всей Европе." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.replainSettings = { id: '64b5def6-9ee7-4b04-be31-287792b23e22' };
      (function(u){var s=document.createElement('script');s.async=true;s.src=u;
      var x=document.getElementsByTagName('script')[0];x.parentNode.insertBefore(s,x);
      })('https://widget.replain.cc/dist/client.js');
    </script>
    <script>
      (function() {
        var RADIUS = '22px';
        var watched = new WeakSet();

        function applyStyle(el) {
          el.style.setProperty('border-radius', RADIUS, 'important');
          el.style.setProperty('overflow', 'hidden', 'important');
        }

        function watchEl(el) {
          if (watched.has(el)) return;
          watched.add(el);
          applyStyle(el);
          new MutationObserver(function() {
            applyStyle(el);
          }).observe(el, { attributes: true, attributeFilter: ['style'] });
        }

        function findAndWatch() {
          var all = document.querySelectorAll('[id*="replain"], [class*="replain"], [data-replain]');
          all.forEach(function(el) {
            if (window.getComputedStyle(el).position === 'fixed') {
              watchEl(el);
            }
          });
        }

        new MutationObserver(findAndWatch).observe(document.body, { childList: true, subtree: true });
        setTimeout(findAndWatch, 500);
        setTimeout(findAndWatch, 2000);
      })();
    </script>
  </body>
</html>
