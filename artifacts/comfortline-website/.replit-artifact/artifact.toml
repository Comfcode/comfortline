kind = "web"
previewPath = "/"
title = "ComfortLine Website"
version = "1.0.0"
id = "artifacts/comfortline-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24307

[services.development]
run = "pnpm --filter @workspace/comfortline-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/comfortline-website", "run", "build" ]
publicDir = "artifacts/comfortline-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24307"
BASE_PATH = "/"
