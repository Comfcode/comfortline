openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: borderQueue
    description: Live Belarusian border checkpoint queue monitoring
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /border-queue:
    get:
      operationId: getBorderQueue
      tags: [borderQueue]
      summary: Get live border checkpoint queue status
      description: Returns live vehicle queue counts per Belarusian border checkpoint, sourced from mon.declarant.by.
      responses:
        "200":
          description: Border queue status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BorderQueueStatus"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    BorderQueueCheckpoint:
      type: object
      required: [name, cars, trucks, buses, moto, total, priority]
      properties:
        name:
          type: string
        cars:
          type: integer
        trucks:
          type: integer
        buses:
          type: integer
        moto:
          type: integer
        total:
          type: integer
        priority:
          type: integer
    BorderQueueStatus:
      type: object
      required: [checkpoints, fetchedAt, stale, error]
      properties:
        updatedAt:
          type: ["string", "null"]
        fetchedAt:
          type: string
        checkpoints:
          type: array
          items:
            $ref: "#/components/schemas/BorderQueueCheckpoint"
        stale:
          type: boolean
        error:
          type: boolean

